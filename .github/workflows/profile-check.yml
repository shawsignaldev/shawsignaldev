name: Profile Check

on:
  push:
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify profile files
        run: |
          test -f README.md
          test -f PROJECTS.md
          test -f RECRUITER_PACKET.md
          test -f TECHNICAL_DEPTH_MATRIX.md
          test -f ENGINEERING_PRINCIPLES.md
          test -f PORTFOLIO_REVIEW_GUIDE.md
          test -f PACKAGE_SURFACES.md
          test -f AVATAR.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f RESEARCH_READING_MAP.md
          test -f ROLE_PACKETS.md
          test -f PORTFOLIO_EVIDENCE_LEDGER.md
          test -f REPRODUCIBILITY_GUIDE.md
          test -f assets/profile-mark.svg
          test -f assets/shawsignaldev-avatar.png
          test -f papers/market-data-infrastructure-whitepaper.md
          test -f papers/strategy-robustness-whitepaper.md
          test -f papers/fpga-trading-architecture-whitepaper.md
      - name: Verify research paper links
        run: python -m unittest discover -s tests -v
